services:
  postgres:
    image: postgres:15-alpine
    container_name: reqai_db
    environment:
      POSTGRES_USER: reqai_user
      POSTGRES_PASSWORD: reqai_password
      POSTGRES_DB: reqai_db
    ports:
      - "5432:5432"
    volumes:
      - reqai_new_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: reqai_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@reqai.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  reqai_new_data: