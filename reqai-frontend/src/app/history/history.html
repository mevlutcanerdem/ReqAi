<div style="max-width: 900px; margin: 50px auto; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

  <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1976d2; padding-bottom: 15px; margin-bottom: 30px;">
    <h2 style="color: #1565c0; margin: 0;">📋 Past Analyses ({{ documents.length }} Found)</h2>
    <a routerLink="/upload" style="background-color: #1976d2; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold;">+ New Analysis</a>
  </div>

  <table style="width: 100%; border-collapse: collapse; background-color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden;">
    <thead style="background-color: #f5f5f5;">
    <tr>
      <th style="padding: 15px; text-align: left; color: #424242; font-weight: 600;">Document Name</th>
      <th style="padding: 15px; text-align: left; color: #424242; font-weight: 600;">Upload Date</th>
      <th style="padding: 15px; text-align: center; color: #424242; font-weight: 600;">Action</th>
    </tr>
    </thead>
    <tbody>
    @if (documents.length === 0) {
    <tr>
      <td colspan="3" style="text-align: center; padding: 30px; color: #757575;">No documents analyzed yet. Upload a file to get started!</td>
    </tr>
    }

    @for (doc of documents; track doc.id) {
    <tr style="border-top: 1px solid #eeeeee;">
      <td style="padding: 15px; font-weight: 500; color: #1565c0;">{{ doc.fileName }}</td>
      <td style="padding: 15px; color: #616161;">{{ doc.uploadDate | date:'medium' }}</td>
      <td style="padding: 15px; text-align: center;">
        <a [routerLink]="['/analysis', doc.id]" style="background-color: #e3f2fd; color: #1976d2; padding: 8px 16px; text-decoration: none; border-radius: 20px; font-size: 0.9rem; font-weight: bold;">View Details</a>
      </td>
    </tr>
    }
    </tbody>
  </table>
</div>
