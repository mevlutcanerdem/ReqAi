<div class="auth-container">
  <div class="auth-card">
    <div class="brand-header">
      <h2><span class="highlight">Req</span>AI</h2>
      <p>Yeni bir hesap oluşturun ve analizlere başlayın.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

      <!-- Sadece Kullanıcı Adı ve Şifre Kaldı -->
      <div class="input-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" name="username" [(ngModel)]="registerData.username" required placeholder="Kullanıcı adınızı belirleyin">
      </div>

      <div class="input-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" name="password" [(ngModel)]="registerData.password" required placeholder="••••••••">
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="!registerForm.valid || isLoading">
        <span *ngIf="!isLoading">Kayıt Ol</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Zaten bir hesabınız var mı? <a routerLink="/login">Giriş Yapın</a></p>
    </div>
  </div>
</div>
